version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - node scripts/write-amplify-env.mjs
        - 'if [ -n "${AWS_PULL_REQUEST_ID:-}" ]; then env -u NEXT_PUBLIC_GA_MEASUREMENT_ID npm run build; else npm run build; fi'
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
